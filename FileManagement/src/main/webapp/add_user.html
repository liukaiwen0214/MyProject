<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>添加用户</title>
    <script>
        function validateForm() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            if (username.length < 3) {
                alert('用户名长度至少为3个字符');
                return false;
            }
            if (password.length < 6) {
                alert('密码长度至少为6个字符');
                return false;
            }
            return true;
        }
    </script>
</head>

<body>
<h1>添加用户</h1>
<form action="/user/add" method="post" onsubmit="return validateForm()">
    <label for="username">用户名：</label><input type="text" id="username" name="username" required><br>
    <label for="password">密码：</label><input type="password" id="password" name="password" required><br>
    <input type="submit" value="提交">
</form>
</body>

</html>
